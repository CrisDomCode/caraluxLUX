<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#18273B" />
        <title>Page introuvable - Caralux</title>
        <link rel="icon" type="image/webp" href="/images/favicon.webp" />
        <style>
            *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
            :root {
                --navy: #18273b;
                --red: #0f5fce;
                --red-hover: #0b4da8;
                --white: #fff;
                --muted: #6b7280;
                --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            }
            body {
                font-family: var(--font-sans);
                color: var(--navy);
                background: #fafafa;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                padding: 2rem;
            }
            .container { max-width: 480px; }
            h1 {
                font-size: 5rem;
                font-weight: 800;
                color: var(--red);
                line-height: 1;
            }
            h2 {
                font-size: 1.5rem;
                font-weight: 600;
                margin: 0.75rem 0;
            }
            p {
                color: var(--muted);
                margin-bottom: 2rem;
                line-height: 1.6;
            }
            a {
                display: inline-block;
                background: #00D82F;
                color: var(--white);
                text-decoration: none;
                padding: 0.875rem 2rem;
                border-radius: 0.5rem;
                font-weight: 600;
                transition: background 0.2s;
            }
            a:hover { background: #00b827; }
        </style>
        <script defer src="https://cloud.umami.is/script.js" data-website-id="a5a75db2-463c-43e8-bfbd-3edef5a0cba8"></script>
    </head>
    <body>
        <div class="container">
            <h1>404</h1>
            <h2>Page introuvable</h2>
            <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
            <a href="/">Retour à l'accueil</a>
        </div>
    </body>
</html>
